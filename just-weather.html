        const getBrowserLanguage = () => {
          const browserLang = navigator.language.split('-')[0].toLowerCase();
          const supportedLangs = ['ro', 'en', 'es', 'fr', 'zh'];
          return supportedLangs.includes(browserLang) ? browserLang : 'en'; // Engleză ca fallback
        };

          const [breathCount, setBreathCount] = useState(0);
          const breathTimerRef = useRef(null);

            const updatePeriod = () => {
              const currentHour = new Date().getHours();
              if (currentHour >= 5 && currentHour < 12) setTimePeriod("morning");
              else if (currentHour >= 12 && currentHour < 18) setTimePeriod("afternoon");
              else if (currentHour >= 18 && currentHour < 22) setTimePeriod("evening");
              else setTimePeriod("night");
            };
            updatePeriod();
            const interval = setInterval(updatePeriod, 60000); 
            return () => clearInterval(interval);
          }, []);

            if (code === undefined || code === null) return 'clear';
            if (code === 0) return 'clear';
            if (code >= 1 && code <= 3) return 'cloudy';
            if (code === 45 || code === 48) return 'foggy';
            if ((code >= 51 && code <= 67) || (code >= 80 && code <= 82)) return 'rainy';
            if ((code >= 71 && code <= 77) || (code >= 85 && code <= 86)) return 'snowy';
            if (code >= 95) return 'stormy';
            return 'clear';
          };

          const weatherCategory = weatherData ? getWeatherCategory(weatherData.code) : 'clear';
          const currentTheme = themeData[weatherCategory];
          const isCurrentCitySaved = weatherData && savedCities.some(c => c.city === weatherData.city);

          const toggleSaveCity = () => {
            if (!weatherData) return;
            if (isCurrentCitySaved) {
              setSavedCities(prev => prev.filter(c => c.city !== weatherData.city));
            } else {
              setSavedCities(prev => [...prev, { city: weatherData.city, lat: weatherData.lat, lon: weatherData.lon }]);
            }
          };

          const fetchWeatherByCoords = async (lat, lon, cityName = "") => {
            setLoading(true);
            setStatusMessage(translations[lang]?.detecting || "Se caută...");
            try {
              const weatherRes = await fetch(
                `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,apparent_temperature,precipitation,weather_code,wind_speed_10m&hourly=temperature_2m,weather_code&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max&timezone=auto`
              );
              const weatherJson = await weatherRes.json();
              
              let resolvedCityName = cityName;
              if (!resolvedCityName) {
                try {
                  const geoRes = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&zoom=10`);
                  const geoJson = await geoRes.json();
                  resolvedCityName = geoJson.address?.city || geoJson.address?.town || geoJson.address?.village || translations[lang].currentLocation;
                } catch (e) {
                  resolvedCityName = translations[lang]?.currentLocation || "Locația Ta";
                }
              }

              const current = weatherJson.current;
              const hourly = weatherJson.hourly;
              const daily = weatherJson.daily;

              const nextHours = [];
              if (hourly && hourly.time) {
                for (let i = 0; i < 8; i++) {
                  const timeVal = new Date(hourly.time[i]);
                  const formattedTime = timeVal.toLocaleTimeString(lang, { hour: '2-digit', minute: '2-digit', hour12: false });
                  nextHours.push({
                    time: formattedTime,
                    temp: Math.round(hourly.temperature_2m[i]),
                    code: hourly.weather_code[i]
                  });
                }
              }

              const nextDays = [];
              if (daily && daily.time) {
                for (let i = 1; i < 6; i++) {
                  const dateVal = new Date(daily.time[i]);
                  const dayName = dateVal.toLocaleDateString(lang, { weekday: 'short' });
                  nextDays.push({
                    day: dayName,
                    code: daily.weather_code[i],
                    max: Math.round(daily.temperature_2m_max[i]),
                    min: Math.round(daily.temperature_2m_min[i]),
                    precipProb: daily.precipitation_probability_max?.[i] || 0
                  });
                }
              }

              setWeatherData({
                temp: Math.round(current.temperature_2m),
                humidity: Math.round(current.relative_humidity_2m),
                code: current.weather_code,
                windspeed: Math.round(current.wind_speed_10m),
                feels: Math.round(current.apparent_temperature),
                precipitation: current.precipitation || 0,
                city: resolvedCityName,
                lat: lat,
                lon: lon,
                hourly: nextHours,
                daily: nextDays
              });
              setStatusMessage("");
            } catch (error) {
              console.error(error);
              setStatusMessage(translations[lang]?.detectError || "Eroare.");
            } finally {
              setLoading(false);
            }
          };

          const handleSearch = async (e) => {
            if (e) e.preventDefault();
            const cleanQuery = searchQuery.trim();
            if (!cleanQuery) return;

            setLoading(true);
            setStatusMessage("");
            setLocationWarning(""); 
            try {
              const geoRes = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(cleanQuery)}&count=1&language=${lang === 'zh' ? 'en' : lang}`);
              const geoJson = await geoRes.json();

              if (geoJson.results && geoJson.results.length > 0) {
                const result = geoJson.results[0];
                await fetchWeatherByCoords(result.latitude, result.longitude, result.name);
                setSearchQuery("");
              } else {
                setStatusMessage(translations[lang]?.cityNotFound || "Nu a fost găsit.");
              }
            } catch (error) {
              setStatusMessage(translations[lang]?.detectError || "Eroare.");
            } finally {
              setLoading(false);
            }
          };

          const getLocationWithIPFallback = async () => {
            setLoading(true);
            setStatusMessage(translations[lang]?.detecting || "Se caută...");
            setLocationWarning("");

            const fallbackToIPGeo = async () => {
              try {
                const res = await fetch('https://get.geojs.io/v1/ip/geo.json');
                const data = await res.json();
                if (data.latitude && data.longitude) {
                   setLocationWarning(translations[lang]?.approxLocation || "Locație IP.");
                   await fetchWeatherByCoords(parseFloat(data.latitude), parseFloat(data.longitude), data.city || translations[lang]?.currentLocation);
                } else {
                   throw new Error("Invalid IP Data");
                }
              } catch (err) {
                fetchWeatherByCoords(47.65, 23.56, "Baia Mare");
              }
            };

            if (navigator.geolocation) {
              navigator.geolocation.getCurrentPosition(
                (position) => {
                  fetchWeatherByCoords(position.coords.latitude, position.coords.longitude);
                },
                (error) => {
                  fallbackToIPGeo();
                },
                { timeout: 15000, enableHighAccuracy: true, maximumAge: 0 }
              );
            } else {
              fallbackToIPGeo();
            }
          };

          useEffect(() => {
            getLocationWithIPFallback();
          }, []);

          useEffect(() => {
            if (weatherData && statusMessage) {
              setStatusMessage(translations[lang]?.cityNotFound || "");
            }
          }, [lang, weatherCategory]);

          useEffect(() => {
            if (isBreathing) {
              const runBreathingCycle = () => {
                setBreathPhase('inhale');
                breathTimerRef.current = setTimeout(() => {
                  setBreathPhase('hold');
                  breathTimerRef.current = setTimeout(() => {
                    setBreathPhase('exhale');
                    breathTimerRef.current = setTimeout(() => {
                      setBreathCount(prev => prev + 1);
                      runBreathingCycle();
                    }, 4000);
                  }, 4000);
                }, 4000);
              };
              runBreathingCycle();
            } else {
              if (breathTimerRef.current) clearTimeout(breathTimerRef.current);
              setBreathPhase('idle');
            }
            return () => {
              if (breathTimerRef.current) clearTimeout(breathTimerRef.current);
            };
          }, [isBreathing]);

          const getWeatherEmoji = (code) => {
            if (code === 0) return "☀️";
            if (code >= 1 && code <= 3) return "⛅";
            if (code === 45 || code === 48) return "🌫️";
            if ((code >= 51 && code <= 67) || (code >= 80 && code <= 82)) return "🌧️";
            if ((code >= 71 && code <= 77) || (code >= 85 && code <= 86)) return "❄️";
            if (code >= 95) return "⛈️";
            return "☀️";
          };

          const renderWeatherIcon = (category) => {
            const defaultClass = "w-24 h-24 stroke-current filter drop-shadow-md transition-all duration-700";
            switch (category) {
              case 'clear': return <svg className={`${defaultClass} ${currentTheme.iconColor} animate-spin-slow`} fill="none" viewBox="0 0 24 24" strokeWidth="1.5"><circle cx="12" cy="12" r="5" strokeLinecap="round" strokeLinejoin="round" /><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41" strokeLinecap="round" strokeLinejoin="round" /></svg>;
              case 'cloudy': return <svg className={`${defaultClass} ${currentTheme.iconColor} animate-bounce-slow`} fill="none" viewBox="0 0 24 24" strokeWidth="1.5"><path strokeLinecap="round" strokeLinejoin="round" d="M2.25 15a4.5 4.5 0 004.5 4.5H18a3.75 3.75 0 001.332-7.257 3 3 0 00-3.758-3.848 5.25 5.25 0 00-10.233 2.33A4.502 4.502 0 002.25 15z" /></svg>;
              case 'rainy': return <svg className={`${defaultClass} ${currentTheme.iconColor}`} fill="none" viewBox="0 0 24 24" strokeWidth="1.5"><path strokeLinecap="round" strokeLinejoin="round" d="M2.25 15a4.5 4.5 0 004.5 4.5H18a3.75 3.75 0 001.332-7.257 3 3 0 00-3.758-3.848 5.25 5.25 0 00-10.233 2.33A4.502 4.502 0 002.25 15z" /><path className="animate-pulse" strokeLinecap="round" strokeLinejoin="round" d="M8.25 21v-1.5M12 22.5V21M15.75 21v-1.5" /></svg>;
              case 'snowy': return <svg className={`${defaultClass} ${currentTheme.iconColor} animate-spin-slow`} fill="none" viewBox="0 0 24 24" strokeWidth="1.5"><path strokeLinecap="round" strokeLinejoin="round" d="M12 3v18M3 12h18m-3-6L6 18M6 6l12 12" /></svg>;
              case 'stormy': return <svg className={`${defaultClass} ${currentTheme.iconColor}`} fill="none" viewBox="0 0 24 24" strokeWidth="1.5"><path strokeLinecap="round" strokeLinejoin="round" d="M2.25 15a4.5 4.5 0 004.5 4.5H18a3.75 3.75 0 001.332-7.257 3 3 0 00-3.758-3.848 5.25 5.25 0 00-10.233 2.33A4.502 4.502 0 002.25 15z" /><path className="animate-pulse" strokeLinecap="round" strokeLinejoin="round" d="M11.25 19.5l-3 4.5h6l-3 4.5" /></svg>;
              case 'foggy': return <svg className={`${defaultClass} ${currentTheme.iconColor} animate-pulse`} fill="none" viewBox="0 0 24 24" strokeWidth="1.5"><path strokeLinecap="round" strokeLinejoin="round" d="M3 10h18M3 14h18M5 18h14" /></svg>;
              default: return null;
            }
          };

          const circleStyle = {
            transform: breathPhase === 'inhale' || breathPhase === 'hold' ? 'scale(1.8)' : 'scale(1)',
            backgroundColor: currentTheme.isDark ? 'rgba(255, 255, 255, 0.25)' : 'rgba(15, 23, 42, 0.12)',
            boxShadow: breathPhase === 'hold' 
              ? (currentTheme.isDark ? '0 0 35px rgba(255, 255, 255, 0.45)' : '0 0 30px rgba(15, 23, 42, 0.18)')
              : 'none',
            transition: isBreathing ? 'all 4000ms cubic-bezier(0.4, 0, 0.2, 1)' : 'all 1000ms ease'
          };

          const breathTextColor = currentTheme.isDark ? '#ffffff' : '#0f172a';

          return (
            <div className={`min-h-screen flex flex-col items-center justify-between p-4 md:p-8 transition-colors duration-1000 bg-gradient-to-br ${currentTheme.bgGradient}`}>
              
              <header className="w-full max-w-4xl relative mb-6 mt-4 z-10 flex flex-col items-center justify-center">
                <div className="flex bg-white/20 backdrop-blur-md rounded-full p-1 border border-white/20 shadow-sm mb-6 max-w-xs justify-center flex-wrap gap-1">
                  {['ro', 'en', 'es', 'fr', 'zh'].map((l) => (
                    <button
                      key={l}
                      type="button"
                      onClick={() => setLang(l)}
                      className={`px-3 py-1 rounded-full text-xs font-bold uppercase transition-all ${
                        lang === l ? `${currentTheme.btnActive} shadow-sm` : currentTheme.btnInactive
                      }`}
                    >
                      {l}
                    </button>
                  ))}
                </div>

                <div className={`w-14 h-14 rounded-full flex items-center justify-center backdrop-blur-sm transition-all duration-700 hover:scale-105 ${currentTheme.cardBg}`}>
                  <svg className={`w-8 h-8 ${currentTheme.iconColor}`} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                    <path d="M4 12c1.5-2 3.5-3 5.5-1s3 4 5 1 3.5-3 5.5-1" />
                    <path d="M4 16c1.5-2 3.5-3 5.5-1s3 4 5 1 3.5-3 5.5-1" className="opacity-50" />
                    <circle cx="12" cy="5.5" r="2" fill="currentColor" />
                  </svg>
                </div>
              </header>

              <main className="w-full max-w-2xl flex-grow flex flex-col justify-center items-center z-10 gap-6">
                
                <div className="w-full">
                  <form onSubmit={handleSearch} className="w-full flex gap-2">
                    <div className="relative flex-grow">
                      <input
                        type="text"
                        value={searchQuery}
                        onChange={(e) => setSearchQuery(e.target.value)}
                        placeholder={translations[lang]?.searchPlaceholder || "Caută oraș..."}
                        className={`w-full rounded-2xl pl-5 pr-12 py-3 text-base font-semibold transition-all outline-none hover:shadow-md focus:shadow-lg focus:scale-[1.02] ${currentTheme.cardBg} ${currentTheme.textPrimary} placeholder:text-current placeholder:opacity-50`}
                      />
                      <button 
                        type="button"
                        onClick={getLocationWithIPFallback}
                        title={translations[lang]?.locateMe || "Locația mea"}
                        className="absolute right-2 top-1/2 transform -translate-y-1/2 p-2 rounded-full hover:bg-black/10 text-current transition-all active:scale-90"
                      >
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                          <polygon points="3 11 22 2 13 21 11 13 3 11"></polygon>
                        </svg>
                      </button>
                    </div>
                    <button 
                      type="submit" 
                      disabled={loading} 
                      className={`px-6 py-3 rounded-2xl font-bold transition-all whitespace-nowrap shadow-sm active:scale-95 ${currentTheme.btnActive}`}
                    >
                      {loading ? "..." : (translations[lang]?.searchBtn || "Caută")}
                    </button>
                  </form>

                  {savedCities.length > 0 && (
                    <div className={`w-full flex flex-wrap items-center gap-2 mt-3 animate-fadeIn px-2 ${currentTheme.textPrimary}`}>
                      <span className="text-xs font-bold uppercase opacity-60 mr-1">{translations[lang]?.savedCities || "Salvate:"}</span>
                      {savedCities.map((cityObj, idx) => (
                        <button 
                          key={idx}
                          type="button"
                          onClick={() => fetchWeatherByCoords(cityObj.lat, cityObj.lon, cityObj.city)}
                          className={`px-3 py-1 rounded-full text-xs font-bold transition-all active:scale-95 ${currentTheme.btnInactive}`}
                        >
                          {cityObj.city}
                        </button>
                      ))}
                    </div>
                  )}
                </div>

                {statusMessage && (
                  <div className={`text-sm px-4 py-2 rounded-full text-center font-bold border border-current/15 ${currentTheme.badgeBg}`}>
                    {statusMessage}
                  </div>
                )}
                
                {locationWarning && (
                  <div className="text-xs px-4 py-2 rounded-full border border-orange-500/20 bg-orange-500/10 text-orange-600 text-center flex items-center gap-2 font-semibold">
                    <span>ℹ️</span> {locationWarning}
                  </div>
                )}

                {weatherData && (
                  <div className={`w-full rounded-3xl p-6 md:p-8 shadow-xl transition-all duration-700 flex flex-col items-center gap-6 ${currentTheme.cardBg} ${currentTheme.textPrimary}`}>
                    
                    <div className="flex border-b border-black/10 w-full mb-2 relative z-20">
                      <button
                        type="button"
                        onClick={() => setActiveTab('weather')}
                        className={`flex-1 pb-3 text-xs sm:text-sm transition-all border-b-2 cursor-pointer ${
                          activeTab === 'weather' 
                            ? 'border-current font-bold opacity-100' 
                            : 'border-transparent font-semibold opacity-50 hover:opacity-100'
                        }`}
                      >
                        {translations[lang]?.weatherTab || "Vremea"}
                      </button>
                      <button
                        type="button"
                        onClick={() => setActiveTab('tips')}
                        className={`flex-1 pb-3 text-xs sm:text-sm transition-all border-b-2 cursor-pointer ${
                          activeTab === 'tips' 
                            ? 'border-current font-bold opacity-100' 
                            : 'border-transparent font-semibold opacity-50 hover:opacity-100'
                        }`}
                      >
                        {translations[lang]?.tipsTab || "Sfaturi"}
                      </button>
                    </div>

                    {activeTab === 'weather' && (
                      <div className="w-full flex flex-col gap-6">
                        <div className="flex flex-col items-center gap-3">
                          <span className={`text-xs font-bold uppercase tracking-widest px-3 py-1 rounded-full ${currentTheme.badgeBg}`}>
                            {translations[lang]?.[`weather${weatherCategory.charAt(0).toUpperCase() + weatherCategory.slice(1)}`] || ""}
                          </span>
                          
                          <div className="flex items-center justify-center gap-3 mt-1">
                            <h2 className="text-2xl md:text-4xl font-light tracking-wide">{weatherData.city}</h2>
                            <button 
                              type="button"
                              onClick={toggleSaveCity} 
                              title={translations[lang]?.saveCity || "Salvează"}
                              className={`p-2 rounded-full transition-all hover:scale-110 active:scale-90 ${isCurrentCitySaved ? 'text-yellow-500 drop-shadow-md' : 'opacity-40 hover:opacity-100 hover:bg-black/5'}`}
                            >
                              <svg width="24" height="24" viewBox="0 0 24 24" fill={isCurrentCitySaved ? "currentColor" : "none"} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                                <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
                              </svg>
                            </button>
                          </div>
                        </div>

                        <div className="flex flex-col sm:flex-row items-center justify-center gap-6">
                          {renderWeatherIcon(weatherCategory)}
                          <div className="text-center sm:text-left">
                            <span className="text-7xl md:text-8xl font-thin tracking-tighter">{weatherData.temp}°</span>
                            <p className={`text-sm font-semibold mt-1 ${currentTheme.textSecondary}`}>{translations[lang]?.feelsLike || "Se simte"}: {weatherData.feels}°C</p>
                          </div>
                        </div>

                        <div className="grid grid-cols-3 gap-3 w-full pt-4 border-t border-black/10">
                          <div className={`flex flex-col items-center p-3 rounded-2xl ${currentTheme.panelBg}`}>
                            <span className={`text-[10px] sm:text-xs font-bold uppercase opacity-60 ${currentTheme.textSecondary}`}>{translations[lang]?.wind || "Vânt"}</span>
                            <span className="text-sm sm:text-base font-bold mt-1">{weatherData.windspeed} km/h</span>
                          </div>
                          <div className={`flex flex-col items-center p-3 rounded-2xl ${currentTheme.panelBg}`}>
                            <span className={`text-[10px] sm:text-xs font-bold uppercase opacity-60 ${currentTheme.textSecondary}`}>{translations[lang]?.humidity || "Umiditate"}</span>
                            <span className="text-sm sm:text-base font-bold mt-1">{weatherData.humidity}%</span>
                          </div>
                          <div className={`flex flex-col items-center p-3 rounded-2xl ${currentTheme.panelBg}`}>
                            <span className={`text-[10px] sm:text-xs font-bold uppercase opacity-60 ${currentTheme.textSecondary}`}>{translations[lang]?.precipitation || "Ploaie"}</span>
                            <span className="text-sm sm:text-base font-bold mt-1">{weatherData.precipitation} mm</span>
                          </div>
                        </div>

                        {weatherData.hourly && (
                          <div className="w-full pt-4 border-t border-black/10">
                            <h4 className="text-xs font-bold uppercase tracking-wider mb-3 opacity-60">{translations[lang]?.hourlyTitle || "Ore"}</h4>
                            <div className="flex overflow-x-auto gap-3 pb-2 scrollbar-none">
                              {weatherData.hourly.map((h, i) => (
                                <div key={i} className={`flex flex-col items-center min-w-[64px] p-2 rounded-xl ${currentTheme.panelBg}`}>
                                  <span className="text-xs opacity-75">{h.time}</span>
                                  <span className="text-lg my-1">{getWeatherEmoji(h.code)}</span>
                                  <span className="text-sm font-bold">{h.temp}°</span>
                                </div>
                              ))}
                            </div>
                          </div>
                        )}

                        {weatherData.daily && (
                          <div className="w-full pt-4 border-t border-black/10">
                            <h4 className="text-xs font-bold uppercase tracking-wider mb-3 opacity-60">{translations[lang]?.dailyTitle || "Zile"}</h4>
                            <div className="flex flex-col gap-2">
                              {weatherData.daily.map((d, i) => (
                                <div key={i} className={`flex items-center justify-between p-3 rounded-xl text-sm ${currentTheme.panelBg}`}>
                                  <span className="font-semibold w-16 uppercase">{d.day}</span>
                                  
                                  <div className="flex items-center gap-1 w-20">
                                    <span className="text-xl">{getWeatherEmoji(d.code)}</span>
                                    {d.precipProb > 0 && (
                                      <span className={`text-[10px] font-bold ${currentTheme.isDark ? 'text-blue-300' : 'text-blue-600'} opacity-80`}>
                                        {d.precipProb}%
                                      </span>
                                    )}
                                  </div>
                                  
                                  <div className="flex gap-2 font-bold justify-end w-16">
                                    <span className="opacity-95">{d.max}°</span>
                                    <span className="opacity-50">{d.min}°</span>
                                  </div>
                                </div>
                              ))}
                            </div>
                          </div>
                        )}

                      </div>
                    )}

                    {activeTab === 'tips' && (
                      <div className="w-full flex flex-col gap-6 text-center min-h-[220px] justify-center">
                        <div className="w-full">
                          <h3 className={`text-xs font-bold tracking-wider uppercase opacity-60 mb-2 ${currentTheme.textSecondary}`}>
                            {translations[lang]?.tipsTitle || "Sfaturi Vreme"}
                          </h3>
                          <div className={`text-sm md:text-base font-semibold leading-relaxed p-4 rounded-2xl border shadow-sm text-left ${currentTheme.panelBg} border-black/5`}>
                            <span className="mr-2">💡</span>
                            {appData[weatherCategory]?.tips?.[lang] || "O zi excelentă în perspectivă!"}
                          </div>
                        </div>

                        <div className="w-full">
                          <h3 className={`text-xs font-bold tracking-wider uppercase opacity-60 mb-2 ${currentTheme.textSecondary}`}>
                            {translations[lang]?.[`period_${timePeriod}`] || "Ghidul tău"}
                          </h3>
                          <div className={`text-sm md:text-base font-semibold leading-relaxed p-4 rounded-2xl border shadow-sm text-left ${currentTheme.panelBg} border-black/5`}>
                            <span className="mr-2">🧘‍♀️</span>
                            {timeOfDayTipsData[timePeriod]?.[lang] || "Amintește-ți să iei o pauză."}
                          </div>
                        </div>

                        <div className="w-full">
                          <h3 className={`text-xs font-bold tracking-wider uppercase opacity-60 mb-2 ${currentTheme.textSecondary}`}>
                            {translations[lang]?.generalTipsTitle || "Obiceiuri Sănătoase"}
                          </h3>
                          <div className="grid grid-cols-1 md:grid-cols-2 gap-2 text-left text-xs md:text-sm">
                            {(generalTipsData[lang] || generalTipsData.en).map((tip, idx) => (
                              <div key={idx} className={`p-3 rounded-xl border flex items-start gap-2 ${currentTheme.panelBg} border-black/5`}>
                                <span className="text-sm">✨</span>
                                <span>{tip}</span>
                              </div>
                            ))}
                          </div>
                        </div>
                      </div>
                    )}

                  </div>
                )}

                <section className={`w-full rounded-3xl p-6 md:p-8 flex flex-col items-center gap-6 text-center shadow-lg mt-2 ${currentTheme.cardBg} ${currentTheme.textPrimary}`}>
                  <div className="max-w-md">
                    <h3 className="text-lg md:text-xl font-bold">{translations[lang]?.breathingTitle || "Respirație"}</h3>
                    <p className={`text-xs mt-1 font-semibold ${currentTheme.textSecondary}`}>{translations[lang]?.breathingSubtitle || ""}</p>
                  </div>

                  <div className="h-44 w-44 flex items-center justify-center relative my-4">
                    <div className="absolute inset-0 rounded-full border border-current border-opacity-20 animate-pulse"></div>
                    
                    <div 
                      style={circleStyle}
                      className="absolute rounded-full w-24 h-24 border border-white/20"
                    ></div>
                    
                    <div 
                      style={{ color: breathTextColor }}
                      className="relative z-10 font-black text-xs uppercase tracking-widest text-center select-none"
                    >
                        {isBreathing ? (
                          breathPhase === 'inhale' ? (translations[lang]?.inhale || "IN") :
                          breathPhase === 'hold' ? (translations[lang]?.hold || "HOLD") :
                          (translations[lang]?.exhale || "OUT")
                        ) : ""}
                    </div>
                  </div>

                  <div className="flex flex-col items-center gap-2">
                    <button
                      type="button"
                      onClick={() => {
                        setIsBreathing(!isBreathing);
                        if(!isBreathing) setBreathCount(0);
                      }}
                      className={`px-8 py-3 rounded-full text-sm font-bold transition-all active:scale-95 ${
                        isBreathing ? 'bg-rose-500 hover:bg-rose-600 text-white shadow-lg shadow-rose-500/30 border-none' : currentTheme.btnActive
                      }`}
                    >
                      {isBreathing ? (translations[lang]?.stopBreathing || "Stop") : (translations[lang]?.startBreathing || "Start")}
                    </button>
                    {isBreathing && (
                      <span className="text-xs opacity-70 mt-2 font-bold transition-opacity">
                        {translations[lang]?.cyclesCompleted || "Cicluri"}: {breathCount}
                      </span>
                    )}
                  </div>
                </section>

              </main>

              <footer className={`w-full max-w-4xl text-center py-4 border-t border-black/10 mt-8 z-10 ${currentTheme.textPrimary}`}>
                <p className="text-xs opacity-60 tracking-wide font-bold">
                  {translations[lang]?.credits || ""}
                </p>
              </footer>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
