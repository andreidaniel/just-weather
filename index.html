            if (typeof window !== 'undefined') {
                return window.matchMedia('(prefers-color-scheme: dark)').matches;
            }
            return false;
          });

          useEffect(() => {
            const mediaQuery = window.matchMedia('(prefers-color-scheme: dark)');
            const handleChange = (e) => setIsSystemDark(e.matches);
            mediaQuery.addEventListener('change', handleChange);
            return () => mediaQuery.removeEventListener('change', handleChange);
          }, []);

          useEffect(() => { safeSetLocal('jw_lang', lang); }, [lang]);
          useEffect(() => { safeSetLocal('jw_cities', savedCities); }, [savedCities]);

          useEffect(() => {
            const updatePeriod = () => {
              const currentHour = new Date().getHours();
              if (currentHour >= 5 && currentHour < 12) setTimePeriod("morning");
              else if (currentHour >= 12 && currentHour < 18) setTimePeriod("afternoon");
              else if (currentHour >= 18 && currentHour < 22) setTimePeriod("evening");
              else setTimePeriod("night");
            };
            updatePeriod();
            const interval = setInterval(updatePeriod, 60000);
            return () => clearInterval(interval);
          }, []);

          const getWeatherCategory = (code) => {
            if (code === undefined || code === null) return 'clear';
            if (code === 0 || code === 1) return 'clear';
            if (code === 2 || code === 3) return 'cloudy';
            if (code === 45 || code === 48) return 'foggy';
            if ((code >= 51 && code <= 67) || (code >= 80 && code <= 82)) return 'rainy';
            if ((code >= 71 && code <= 77) || (code >= 85 && code <= 86)) return 'snowy';
            if (code >= 95) return 'stormy';
            return 'clear';
          };

          const weatherCategory = weatherData ? getWeatherCategory(weatherData.code) : 'clear';
          const currentTheme = isSystemDark ? darkThemes[weatherCategory] : lightThemes[weatherCategory];
          const isCurrentCitySaved = weatherData && savedCities.some(c => c.city === weatherData.city);

          const triggerVibration = (pattern) => {
              if (typeof window !== 'undefined' && 'vibrate' in navigator) {
                  try { navigator.vibrate(pattern); } catch(e) {}
              }
          };

          const toggleSaveCity = () => {
            triggerVibration(50);
            if (!weatherData) return;
            if (isCurrentCitySaved) {
              setSavedCities(prev => prev.filter(c => c.city !== weatherData.city));
            } else {
              setSavedCities(prev => [...prev, { city: weatherData.city, lat: weatherData.lat, lon: weatherData.lon }]);
            }
          };

          const fetchWeatherByCoords = async (lat, lon, cityName = "") => {
            setLoading(true);
            setStatusMessage(translations[lang]?.detecting || "...");
            try {
              const weatherRes = await fetch(
                `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,apparent_temperature,precipitation,weather_code,wind_speed_10m,surface_pressure&hourly=temperature_2m,weather_code,precipitation_probability&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max,uv_index_max&timezone=auto`
              );
              const weatherJson = await weatherRes.json();
             
              let resolvedCityName = cityName;
              if (!resolvedCityName) {
                try {
                  const geoRes = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&zoom=10`);
                  const geoJson = await geoRes.json();
                  resolvedCityName = geoJson.address?.city || geoJson.address?.town || geoJson.address?.village || translations[lang].currentLocation;
                } catch (e) {
                  resolvedCityName = translations[lang].currentLocation;
                }
              }

              const current = weatherJson.current;
              const hourly = weatherJson.hourly;
              const daily = weatherJson.daily;

              const nextHours = [];
              if (hourly && hourly.time) {
                const now = new Date();
                const currentHourTime = now.getTime() - 60 * 60 * 1000;
                for (let i = 0; i < hourly.time.length; i++) {
                  const timeVal = new Date(hourly.time[i]);
                  if (timeVal.getTime() >= currentHourTime) {
                    const formattedTime = timeVal.toLocaleTimeString(lang, { hour: '2-digit', minute: '2-digit', hour12: false });
                    nextHours.push({
                        time: formattedTime,
                        temp: Math.round(hourly.temperature_2m[i]),
                        code: hourly.weather_code[i],
                        precipProb: hourly.precipitation_probability[i] || 0
                    });
                    if (nextHours.length >= 8) break;
                  }
                }
              }

              const nextDays = [];
              if (daily && daily.time) {
                for (let i = 1; i < 6; i++) {
                  const dateVal = new Date(daily.time[i]);
                  const dayName = dateVal.toLocaleDateString(lang, { weekday: 'short' });
                  nextDays.push({
                    day: dayName, code: daily.weather_code[i], max: Math.round(daily.temperature_2m_max[i]),
                    min: Math.round(daily.temperature_2m_min[i]), precipProb: daily.precipitation_probability_max?.[i] || 0
                  });
                }
              }

              const newWeatherData = {
                temp: Math.round(current.temperature_2m), humidity: Math.round(current.relative_humidity_2m),
                code: current.weather_code, windspeed: Math.round(current.wind_speed_10m), feels: Math.round(current.apparent_temperature),
                precipitation: current.precipitation || 0, city: resolvedCityName, lat: lat, lon: lon,
                hourly: nextHours, daily: nextDays
              };

              setWeatherData(newWeatherData);
              safeSetLocal('jw_lastloc', newWeatherData);

              setMindfulAlert(null);
              if (current.surface_pressure < 1005) {
                  setMindfulAlert(translations[lang].pressureAlert);
              } else if (daily.uv_index_max?.[0] > 6) {
                  setMindfulAlert(translations[lang].uvAlert);
              }

              setStatusMessage("");
            } catch (error) {
              setStatusMessage(translations[lang]?.detectError || "Eroare.");
            } finally {
              setLoading(false);
            }
          };

          const handleSearch = async (e) => {
            if (e) e.preventDefault();
            triggerVibration(20);
            const cleanQuery = searchQuery.trim();
            if (!cleanQuery) return;
            setLoading(true); setStatusMessage(""); setLocationWarning("");
            try {
              const geoRes = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(cleanQuery)}&count=1&language=${lang === 'zh' ? 'en' : lang}`);
              const geoJson = await geoRes.json();
              if (geoJson.results && geoJson.results.length > 0) {
                const result = geoJson.results[0];
                await fetchWeatherByCoords(result.latitude, result.longitude, result.name);
                setSearchQuery("");
              } else {
                setStatusMessage(translations[lang]?.cityNotFound || "Nu a fost găsit.");
              }
            } catch (error) {
              setStatusMessage(translations[lang]?.detectError || "Eroare.");
            } finally {
              setLoading(false);
            }
          };

          const getLocationWithIPFallback = async () => {
            triggerVibration(20);
            setLoading(true);
            setStatusMessage(translations[lang]?.detecting || "...");
            setLocationWarning("");

            const fallbackToIPGeo = async () => {
              try {
                const res = await fetch('https://get.geojs.io/v1/ip/geo.json');
                const data = await res.json();
                if (data.latitude && data.longitude) {
                   setLocationWarning(translations[lang]?.approxLocation || "IP");
                   await fetchWeatherByCoords(parseFloat(data.latitude), parseFloat(data.longitude), data.city || translations[lang].currentLocation);
                } else throw new Error("Invalid IP Data");
              } catch (err) {
                fetchWeatherByCoords(47.65, 23.56, "Baia Mare");
              }
            };

            if (navigator.geolocation) {
              navigator.geolocation.getCurrentPosition(
                (position) => fetchWeatherByCoords(position.coords.latitude, position.coords.longitude),
                () => fallbackToIPGeo(),
                { timeout: 10000, enableHighAccuracy: false, maximumAge: 600000 }
              );
            } else fallbackToIPGeo();
          };

          useEffect(() => {
            if (lastLocation) {
                setWeatherData(lastLocation);
                fetchWeatherByCoords(lastLocation.lat, lastLocation.lon, lastLocation.city).catch(()=>{});
            } else {
                getLocationWithIPFallback();
            }
          }, []);

          useEffect(() => {
            if (isBreathing) {
              const runBreathingCycle = () => {
                setBreathPhase('inhale');
                triggerVibration(100);
                breathTimerRef.current = setTimeout(() => {
                  setBreathPhase('hold');
                  triggerVibration([50, 50, 50]);
                  breathTimerRef.current = setTimeout(() => {
                    setBreathPhase('exhale');
                    triggerVibration([200]);
                    breathTimerRef.current = setTimeout(() => {
                      setBreathCount(prev => prev + 1);
                      runBreathingCycle();
                    }, 4000);
                  }, 4000);
                }, 4000);
              };
              runBreathingCycle();
            } else {
              if (breathTimerRef.current) clearTimeout(breathTimerRef.current);
              setBreathPhase('idle');
            }
            return () => { if (breathTimerRef.current) clearTimeout(breathTimerRef.current); };
          }, [isBreathing]);

          // EMOJI EXTREM DE PRECISE BAZATE PE ȘANSA DE PLOAIE
          const getWeatherEmoji = (code, precipProb = 0) => {
            if (code === 0 || code === 1) return "☀️";
            if (code === 2) return "⛅";
            if (code === 3) return "☁️";
            if (code === 45 || code === 48) return "🌫️";
            if ((code >= 51 && code <= 67) || (code >= 80 && code <= 82)) {
                if (precipProb < 30) return "🌦️"; // Sanse mici sau ploaie foarte slaba
                if (precipProb < 70) return "🌧️"; // Ploaie moderata
                return "☔"; // Ploaie sigura/torentiala
            }
            if ((code >= 71 && code <= 77) || (code >= 85 && code <= 86)) return "❄️";
            if (code >= 95) return "⛈️";
            return "☀️";
          };

          // SVG-URI DINAMICE PENTRU ECRANUL PRINCIPAL
          const renderWeatherIcon = (category, code) => {
            const defaultClass = "w-28 h-28 stroke-current filter drop-shadow-lg transition-all duration-1000";
            switch (category) {
              case 'clear': return <svg className={`${defaultClass} ${currentTheme.iconColor} animate-spin-slow`} fill="none" viewBox="0 0 24 24" strokeWidth="1.2"><circle cx="12" cy="12" r="5" strokeLinecap="round" strokeLinejoin="round" /><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41" strokeLinecap="round" strokeLinejoin="round" /></svg>;
              case 'cloudy':
                if(code === 2) { // Partial innorat (Soare cu nor)
                    return <svg className={`${defaultClass} ${currentTheme.iconColor} animate-bounce-slow`} fill="none" viewBox="0 0 24 24" strokeWidth="1.2">
                        <path strokeLinecap="round" strokeLinejoin="round" d="M3 15a4 4 0 004 4h9a5 5 0 10-1-9.9V9a4 4 0 00-8 0v.1A4 4 0 003 15z" />
                        <circle cx="18" cy="8" r="3" className="animate-pulse" />
                    </svg>;
                }
                return <svg className={`${defaultClass} ${currentTheme.iconColor} animate-bounce-slow`} fill="none" viewBox="0 0 24 24" strokeWidth="1.2"><path strokeLinecap="round" strokeLinejoin="round" d="M2.25 15a4.5 4.5 0 004.5 4.5H18a3.75 3.75 0 001.332-7.257 3 3 0 00-3.758-3.848 5.25 5.25 0 00-10.233 2.33A4.502 4.502 0 002.25 15z" /></svg>;
              case 'rainy':
                if(code === 51 || code === 53 || code === 61 || code === 80) { // Burnita sau Ploaie usoara (1 picatura)
                    return <svg className={`${defaultClass} ${currentTheme.iconColor}`} fill="none" viewBox="0 0 24 24" strokeWidth="1.2"><path strokeLinecap="round" strokeLinejoin="round" d="M2.25 15a4.5 4.5 0 004.5 4.5H18a3.75 3.75 0 001.332-7.257 3 3 0 00-3.758-3.848 5.25 5.25 0 00-10.233 2.33A4.502 4.502 0 002.25 15z" /><path className="animate-pulse" strokeLinecap="round" strokeLinejoin="round" d="M12 22.5V21" /></svg>;
                }
                // Ploaie normala/Grea (3 picaturi)
                return <svg className={`${defaultClass} ${currentTheme.iconColor}`} fill="none" viewBox="0 0 24 24" strokeWidth="1.2"><path strokeLinecap="round" strokeLinejoin="round" d="M2.25 15a4.5 4.5 0 004.5 4.5H18a3.75 3.75 0 001.332-7.257 3 3 0 00-3.758-3.848 5.25 5.25 0 00-10.233 2.33A4.502 4.502 0 002.25 15z" /><path className="animate-pulse" strokeLinecap="round" strokeLinejoin="round" d="M8.25 21v-1.5M12 22.5V21M15.75 21v-1.5" /></svg>;
              case 'snowy': return <svg className={`${defaultClass} ${currentTheme.iconColor} animate-spin-slow`} fill="none" viewBox="0 0 24 24" strokeWidth="1.2"><path strokeLinecap="round" strokeLinejoin="round" d="M12 3v18M3 12h18m-3-6L6 18M6 6l12 12" /></svg>;
              case 'stormy': return <svg className={`${defaultClass} ${currentTheme.iconColor}`} fill="none" viewBox="0 0 24 24" strokeWidth="1.2"><path strokeLinecap="round" strokeLinejoin="round" d="M2.25 15a4.5 4.5 0 004.5 4.5H18a3.75 3.75 0 001.332-7.257 3 3 0 00-3.758-3.848 5.25 5.25 0 00-10.233 2.33A4.502 4.502 0 002.25 15z" /><path className="animate-pulse" strokeLinecap="round" strokeLinejoin="round" d="M11.25 19.5l-3 4.5h6l-3 4.5" /></svg>;
              case 'foggy': return <svg className={`${defaultClass} ${currentTheme.iconColor} animate-pulse`} fill="none" viewBox="0 0 24 24" strokeWidth="1.2"><path strokeLinecap="round" strokeLinejoin="round" d="M3 10h18M3 14h18M5 18h14" /></svg>;
              default: return null;
            }
          };

          const circleStyle = {
            transform: breathPhase === 'inhale' || breathPhase === 'hold' ? 'scale(1.8)' : 'scale(1)',
            backgroundColor: currentTheme.isDark ? 'rgba(255, 255, 255, 0.05)' : 'rgba(0, 0, 0, 0.05)',
            boxShadow: breathPhase === 'hold'
              ? (currentTheme.isDark ? '0 0 30px rgba(255, 255, 255, 0.15)' : '0 0 40px rgba(0, 0, 0, 0.15)')
              : 'none',
            transition: isBreathing ? 'all 4000ms cubic-bezier(0.4, 0, 0.2, 1)' : 'all 1000ms ease'
          };

          const breathTextColor = currentTheme.isDark ? '#f4f4f5' : '#0f172a';

          return (
            <div className={`min-h-screen flex flex-col items-center justify-start p-4 md:p-8 transition-all duration-[1500ms] ease-in-out bg-gradient-to-br ${currentTheme.bgGradient}`}>
             
              <header className="w-full max-w-xl relative z-50 flex justify-end mb-4 mt-2">
                <div className="relative">
                  <button
                    onClick={() => { setIsLangMenuOpen(!isLangMenuOpen); triggerVibration(10); }}
                    className={`flex items-center gap-2 px-4 py-2 rounded-full text-[11px] font-bold uppercase transition-all backdrop-blur-3xl border shadow-sm active:scale-95 ${isLangMenuOpen ? currentTheme.btnActive : currentTheme.panelBg} ${isLangMenuOpen ? '' : currentTheme.textPrimary}`}
                  >
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>
                    {lang}
                  </button>

                  {isLangMenuOpen && (
                    <div className={`absolute right-0 mt-2 flex flex-col rounded-[1.2rem] overflow-hidden backdrop-blur-3xl border shadow-xl animate-fadeInDrop ${currentTheme.panelBg} ${currentTheme.textPrimary}`}>
                      {['ro', 'en', 'es', 'fr', 'zh'].map((l) => (
                        <button
                          key={l} type="button"
                          onClick={() => { setLang(l); setIsLangMenuOpen(false); triggerVibration(15); }}
                          className={`px-6 py-3.5 text-xs font-bold uppercase transition-all hover:bg-white/10 dark:hover:bg-black/10 ${lang === l ? 'opacity-100 bg-black/5 dark:bg-white/5' : 'opacity-50'}`}
                        >
                          {l}
                        </button>
                      ))}
                    </div>
                  )}
                </div>
              </header>

              <main className="w-full max-w-xl flex-grow flex flex-col justify-start items-center z-10 gap-6">
               
                <div className="w-full animate-fadeIn">
                  <form onSubmit={handleSearch} className="w-full flex gap-3">
                    <div className="relative flex-grow">
                      <input
                        type="text" value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)}
                        placeholder={translations[lang]?.searchPlaceholder}
                        className={`w-full rounded-3xl pl-6 pr-14 py-4 text-base font-semibold transition-all outline-none focus:scale-[1.02] focus:shadow-xl ${currentTheme.cardBg} ${currentTheme.textPrimary} placeholder:text-current placeholder:opacity-40`}
                      />
                      <button
                        type="button" onClick={getLocationWithIPFallback}
                        className="absolute right-3 top-1/2 transform -translate-y-1/2 p-2.5 rounded-full hover:bg-black/10 dark:hover:bg-white/10 text-current transition-all active:scale-75"
                      >
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polygon points="3 11 22 2 13 21 11 13 3 11"></polygon></svg>
                      </button>
                    </div>
                  </form>

                  {savedCities.length > 0 && (
                    <div className={`w-full flex flex-wrap items-center gap-2 mt-4 px-2 ${currentTheme.textPrimary}`}>
                      <span className="text-[10px] font-bold uppercase opacity-50 mr-1">{translations[lang]?.savedCities}</span>
                      {savedCities.map((cityObj, idx) => (
                        <button
                          key={idx} type="button" onClick={() => { fetchWeatherByCoords(cityObj.lat, cityObj.lon, cityObj.city); triggerVibration(20); }}
                          className={`px-3 py-1.5 rounded-full text-xs font-bold transition-all active:scale-90 shadow-sm ${currentTheme.btnInactive}`}
                        >
                          {cityObj.city}
                        </button>
                      ))}
                    </div>
                  )}
                </div>

                {statusMessage && <div className={`text-sm px-5 py-2.5 rounded-full animate-pulse font-bold shadow-sm ${currentTheme.badgeBg}`}>{statusMessage}</div>}
                {locationWarning && <div className="text-xs px-5 py-2.5 rounded-full bg-orange-500/10 border border-orange-500/20 text-orange-600 dark:text-orange-400 flex items-center gap-2 font-semibold"><span>ℹ️</span> {locationWarning}</div>}
                {mindfulAlert && <div className={`text-xs md:text-sm px-5 py-3 rounded-2xl ${currentTheme.cardBg} ${currentTheme.textPrimary} font-semibold text-center w-full shadow-sm animate-fadeIn`}>{mindfulAlert}</div>}

                {weatherData && (
                  <div className={`w-full rounded-[2rem] p-6 md:p-8 transition-all duration-1000 flex flex-col items-center gap-8 animate-fadeIn ${currentTheme.cardBg} ${currentTheme.textPrimary}`}>
                   
                    <div className="flex w-full mb-2 relative z-20 gap-2">
                      <button onClick={() => { setActiveTab('weather'); triggerVibration(10); }} className={`flex-1 pb-3 text-xs sm:text-sm transition-all border-b-[3px] ${activeTab === 'weather' ? 'border-current font-bold' : 'border-transparent font-semibold opacity-40 hover:opacity-100'}`}>{translations[lang]?.weatherTab}</button>
                      <button onClick={() => { setActiveTab('tips'); triggerVibration(10); }} className={`flex-1 pb-3 text-xs sm:text-sm transition-all border-b-[3px] ${activeTab === 'tips' ? 'border-current font-bold' : 'border-transparent font-semibold opacity-40 hover:opacity-100'}`}>{translations[lang]?.tipsTab}</button>
                    </div>

                    {activeTab === 'weather' && (
                      <div className="w-full flex flex-col gap-8 animate-fadeIn">
                        <div className="flex flex-col items-center gap-3">
                          <span className={`text-[10px] font-bold uppercase tracking-[0.2em] px-4 py-1.5 rounded-full shadow-sm ${currentTheme.badgeBg}`}>
                            {translations[lang]?.[`weather${weatherCategory.charAt(0).toUpperCase() + weatherCategory.slice(1)}`]}
                          </span>
                          <div className="flex items-center justify-center gap-3 mt-2">
                            <h2 className="text-3xl md:text-4xl font-semibold tracking-tight">{weatherData.city}</h2>
                            <button onClick={toggleSaveCity} className={`p-2.5 rounded-full transition-all active:scale-75 ${isCurrentCitySaved ? 'text-yellow-500 drop-shadow-md' : 'opacity-30 hover:opacity-100 hover:bg-black/5 dark:hover:bg-white/5'}`}>
                              <svg width="24" height="24" viewBox="0 0 24 24" fill={isCurrentCitySaved ? "currentColor" : "none"} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
                            </button>
                          </div>
                        </div>

                        <div className="flex flex-col sm:flex-row items-center justify-center gap-6 md:gap-10">
                          {renderWeatherIcon(weatherCategory, weatherData.code)}
                          <div className="text-center sm:text-left">
                            <span className="text-7xl md:text-8xl font-light tracking-tighter drop-shadow-sm">{weatherData.temp}°</span>
                            <p className={`text-sm font-semibold mt-2 opacity-70`}>{translations[lang]?.feelsLike}: {weatherData.feels}°C</p>
                          </div>
                        </div>

                        <div className="grid grid-cols-3 gap-3 w-full">
                          <div className={`flex flex-col items-center p-4 rounded-2xl ${currentTheme.panelBg}`}>
                            <span className={`text-[10px] font-bold uppercase opacity-50`}>{translations[lang]?.wind}</span>
                            <span className="text-sm font-bold mt-1.5">{weatherData.windspeed} km/h</span>
                          </div>
                          <div className={`flex flex-col items-center p-4 rounded-2xl ${currentTheme.panelBg}`}>
                            <span className={`text-[10px] font-bold uppercase opacity-50`}>{translations[lang]?.humidity}</span>
                            <span className="text-sm font-bold mt-1.5">{weatherData.humidity}%</span>
                          </div>
                          <div className={`flex flex-col items-center p-4 rounded-2xl ${currentTheme.panelBg}`}>
                            <span className={`text-[10px] font-bold uppercase opacity-50`}>{translations[lang]?.precipitation}</span>
                            <span className="text-sm font-bold mt-1.5">{weatherData.precipitation} mm</span>
                          </div>
                        </div>

                        {weatherData.hourly && (
                          <div className="w-full pt-2">
                            <h4 className="text-[10px] font-bold uppercase tracking-widest mb-4 opacity-50 pl-1">{translations[lang]?.hourlyTitle}</h4>
                            <div className="flex overflow-x-auto gap-3 pb-2 scrollbar-none">
                              {weatherData.hourly.map((h, i) => (
                                <div key={i} className={`flex flex-col items-center min-w-[70px] p-3 rounded-2xl ${currentTheme.panelBg}`}>
                                  <span className="text-xs opacity-70 font-semibold">{h.time}</span>
                                  <span className="text-xl my-2 drop-shadow-sm">{getWeatherEmoji(h.code, h.precipProb)}</span>
                                  {h.precipProb > 0 ? (
                                    <span className={`text-[10px] font-bold ${isSystemDark ? 'text-blue-300' : 'text-blue-600'} opacity-90 -mt-1 mb-1`}>{h.precipProb}%</span>
                                  ) : <div className="h-4" />}
                                  <span className="text-sm font-bold">{h.temp}°</span>
                                </div>
                              ))}
                            </div>
                          </div>
                        )}

                        {weatherData.daily && (
                          <div className="w-full pt-2">
                            <h4 className="text-[10px] font-bold uppercase tracking-widest mb-4 opacity-50 pl-1">{translations[lang]?.dailyTitle}</h4>
                            <div className="flex flex-col gap-2">
                              {weatherData.daily.map((d, i) => (
                                <div key={i} className={`flex items-center justify-between p-4 rounded-2xl text-sm ${currentTheme.panelBg}`}>
                                  <span className="font-bold w-16 uppercase opacity-90">{d.day}</span>
                                  <div className="flex items-center gap-2 w-20">
                                    <span className="text-xl drop-shadow-sm">{getWeatherEmoji(d.code, d.precipProb)}</span>
                                    {d.precipProb > 0 && <span className={`text-[10px] font-bold ${isSystemDark ? 'text-blue-300 bg-blue-900/30' : 'text-blue-600 bg-blue-500/10'} opacity-90 px-2 py-0.5 rounded-full`}>{d.precipProb}%</span>}
                                  </div>
                                  <div className="flex gap-3 font-bold justify-end w-16">
                                    <span className="opacity-100">{d.max}°</span>
                                    <span className="opacity-40">{d.min}°</span>
                                  </div>
                                </div>
                              ))}
                            </div>
                          </div>
                        )}
                      </div>
                    )}

                    {activeTab === 'tips' && (
                      <div className="w-full flex flex-col gap-6 text-center animate-fadeIn">
                        <div className="w-full text-left">
                          <h3 className={`text-[10px] font-bold tracking-widest uppercase opacity-50 mb-3 pl-1`}>{translations[lang]?.tipsTitle}</h3>
                          <div className={`text-sm md:text-base font-semibold leading-relaxed p-5 rounded-2xl ${currentTheme.panelBg}`}>
                            <span className="mr-2 opacity-80">💡</span> {appData[weatherCategory]?.tips?.[lang]}
                          </div>
                        </div>

                        <div className="w-full text-left">
                          <h3 className={`text-[10px] font-bold tracking-widest uppercase opacity-50 mb-3 pl-1`}>{translations[lang]?.[`period_${timePeriod}`]}</h3>
                          <div className={`text-sm md:text-base font-semibold leading-relaxed p-5 rounded-2xl ${currentTheme.panelBg}`}>
                            <span className="mr-2 opacity-80">🧘‍♀️</span> {timeOfDayTipsData[timePeriod]?.[lang]}
                          </div>
                        </div>

                        <div className="w-full text-left">
                          <h3 className={`text-[10px] font-bold tracking-widest uppercase opacity-50 mb-3 pl-1`}>{translations[lang]?.generalTipsTitle}</h3>
                          <div className="grid grid-cols-1 md:grid-cols-2 gap-3 text-xs md:text-sm">
                            {(generalTipsData[lang] || generalTipsData.en).map((tip, idx) => (
                              <div key={idx} className={`p-4 rounded-2xl flex items-start gap-3 font-semibold ${currentTheme.panelBg}`}>
                                <span className="opacity-70">✨</span> <span>{tip}</span>
                              </div>
                            ))}
                          </div>
                        </div>
                      </div>
                    )}
                  </div>
                )}

                <section className={`w-full rounded-[2rem] p-6 md:p-8 flex flex-col items-center gap-6 text-center transition-all duration-1000 animate-fadeIn ${currentTheme.cardBg} ${currentTheme.textPrimary}`}>
                 
                  <div className="max-w-md text-center">
                    <h3 className="text-lg md:text-xl font-bold tracking-tight">{translations[lang]?.breathingTitle}</h3>
                    <p className={`text-xs mt-1 font-semibold opacity-60`}>{translations[lang]?.breathingSubtitle}</p>
                  </div>

                  <div className="h-48 w-48 flex items-center justify-center relative my-6">
                    <div className="absolute inset-0 rounded-full border-[1.5px] border-current opacity-10 animate-pulse"></div>
                    <div style={circleStyle} className="absolute rounded-full w-24 h-24 backdrop-blur-sm border border-white/20"></div>
                    <div style={{ color: breathTextColor }} className="relative z-10 font-black text-xs uppercase tracking-[0.3em] text-center select-none opacity-90 drop-shadow-md">
                        {isBreathing ? (breathPhase === 'inhale' ? translations[lang]?.inhale : breathPhase === 'hold' ? translations[lang]?.hold : translations[lang]?.exhale) : ""}
                    </div>
                  </div>

                  <div className="flex flex-col items-center gap-3 w-full">
                    <button
                      type="button" onClick={() => { setIsBreathing(!isBreathing); triggerVibration(30); if(!isBreathing) setBreathCount(0); }}
                      className={`w-full md:w-auto px-10 py-4 rounded-full text-sm font-bold transition-all active:scale-95 ${
                        isBreathing ? 'bg-rose-500 text-white shadow-xl shadow-rose-500/40 border-none' : currentTheme.btnActive
                      }`}
                    >
                      {isBreathing ? translations[lang]?.stopBreathing : translations[lang]?.startBreathing}
                    </button>
                    {isBreathing && <span className="text-[10px] uppercase tracking-widest opacity-60 mt-2 font-bold">{translations[lang]?.cyclesCompleted}: {breathCount}</span>}
                  </div>
                </section>

              </main>

              <footer className={`w-full max-w-xl text-center py-6 mt-8 z-10 ${currentTheme.textPrimary} opacity-50`}>
                <p className="text-[10px] uppercase tracking-widest font-bold">{translations[lang]?.credits}</p>
              </footer>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
