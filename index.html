            } else if (type === "brown") {
              filter.type = 'lowpass';
              filter.frequency.value = 400;
              mainGain.gain.value = 0.22;
              noiseSource.connect(filter);
              filter.connect(mainGain);
            } else if (type === "white") {
              filter.type = 'lowpass';
              filter.frequency.value = 8000;
              mainGain.gain.value = 0.06;
              noiseSource.connect(filter);
              filter.connect(mainGain);
            } else if (type === "green") {
              filter.type = 'bandpass';
              filter.frequency.value = 800;
              filter.Q.value = 0.8;
              mainGain.gain.value = 0.25;
              noiseSource.connect(filter);
              filter.connect(mainGain);
            }
            
            mainGain.connect(ctx.destination);
            
            // Collect all active elements for stopping
            const activeNodes = [noiseSource];
            const activeOscillators = [];
            
            if (overlayType === "rain") {
              const rainSource = ctx.createBufferSource();
              rainSource.buffer = noiseBuffer;
              rainSource.loop = true;
              
              const rainFilter = ctx.createBiquadFilter();
              rainFilter.type = 'highpass';
              rainFilter.frequency.value = 2500;
              
              const rainGain = ctx.createGain();
              rainGain.gain.value = 0.15;
              
              const rainLFO = ctx.createOscillator();
              rainLFO.frequency.value = 0.5;
              
              const rainLFOGain = ctx.createGain();
              rainLFOGain.gain.value = 0.06;
              
              rainLFO.connect(rainLFOGain);
              rainLFOGain.connect(rainGain.gain);
              
              rainSource.connect(rainFilter);
              rainFilter.connect(rainGain);
              rainGain.connect(ctx.destination);
              
              activeNodes.push(rainSource);
              activeOscillators.push(rainLFO);
            } else if (overlayType === "wind") {
              const windSource = ctx.createBufferSource();
              windSource.buffer = noiseBuffer;
              windSource.loop = true;
              
              const windFilter = ctx.createBiquadFilter();
              windFilter.type = 'bandpass';
              windFilter.frequency.value = 450;
              windFilter.Q.value = 2.5;
              
              const windGain = ctx.createGain();
              windGain.gain.value = 0.18;
              
              const windLFO = ctx.createOscillator();
              windLFO.frequency.value = 0.08;
              
              const windLFOGain = ctx.createGain();
              windLFOGain.gain.value = 250;
              
              windLFO.connect(windLFOGain);
              windLFOGain.connect(windFilter.frequency);
              
              windSource.connect(windFilter);
              windFilter.connect(windGain);
              windGain.connect(ctx.destination);
              
              activeNodes.push(windSource);
              activeOscillators.push(windLFO);
            } else if (overlayType === "breeze") {
              const breezeSource = ctx.createBufferSource();
              breezeSource.buffer = noiseBuffer;
              breezeSource.loop = true;
              
              const breezeFilter = ctx.createBiquadFilter();
              breezeFilter.type = 'bandpass';
              breezeFilter.frequency.value = 1600;
              breezeFilter.Q.value = 0.9;
              
              const breezeGain = ctx.createGain();
              breezeGain.gain.value = 0.12;
              
              const breezeLFO = ctx.createOscillator();
              breezeLFO.frequency.value = 0.18;
              
              const breezeLFOGain = ctx.createGain();
              breezeLFOGain.gain.value = 500;
              
              breezeLFO.connect(breezeLFOGain);
              breezeLFOGain.connect(breezeFilter.frequency);
              
              breezeSource.connect(breezeFilter);
              breezeFilter.connect(breezeGain);
              breezeGain.connect(ctx.destination);
              
              activeNodes.push(breezeSource);
              activeOscillators.push(breezeLFO);
            }
            
            // Start all generators
            activeOscillators.forEach(osc => osc.start());
            activeNodes.forEach(src => src.start());
            
            return {
              stop: () => {
                activeNodes.forEach(src => {
                  try { src.stop(); } catch(e){}
                });
                activeOscillators.forEach(osc => {
                  try { osc.stop(); } catch(e){}
                });
                try { ctx.close(); } catch(e){}
              }
            };
          } catch (err) {

         // Calculate exact moon phase based on dates
         const getMoonPhase = (date) => {
           const refDate = new Date("2000-01-06T18:14:00Z");
           const diffMs = date.getTime() - refDate.getTime();
           const diffDays = diffMs / (1000 * 60 * 60 * 24);
           const phase = (diffDays / 29.530588853) % 1;
           const normalizedPhase = phase < 0 ? phase + 1 : phase;
           
           if (normalizedPhase < 0.03 || normalizedPhase > 0.97) {
             return { emoji: "🌑", name: { ro: "Lună Nouă", en: "New Moon", es: "Luna Nueva", fr: "Nouvelle Lune", zh: "新月" } };

           } else if (normalizedPhase < 0.28) {
             return { emoji: "🌓", name: { ro: "Primul Pătrar", en: "First Quarter", es: "Cuarto Creciente", fr: "Premier Quartier", zh: "上弦月" } };

           } else if (normalizedPhase < 0.53) {
             return { emoji: "🌕", name: { ro: "Lună Plină", en: "Full Moon", es: "Luna Llena", fr: "Pleine Lune", zh: "满月" } };
           } else if (normalizedPhase < 0.72) {

           } else if (normalizedPhase < 0.78) {

           } else {
             return { emoji: "🌘", name: { ro: "Semilună în scădere", en: "Waning Crescent", es: "Luna Menguante", fr: "Dernier Croissant", zh: "残月" } };
           }
         };

        function App() {

              navigator.geolocation.getCurrentPosition(
                (position) => fetchWeatherByCoords(position.coords.latitude, position.coords.longitude, "", true),
                () => fallbackToIPGeo(),
                { timeout: 2000, enableHighAccuracy: false, maximumAge: 600000 }
              );
            } else fallbackToIPGeo();
          };

          useEffect(() => {
            const params = new URLSearchParams(window.location.search);
            const queryLat = params.get('lat');
            const queryLon = params.get('lon');
            const queryCity = params.get('city');

            if (queryLat && queryLon && queryCity) {
              fetchWeatherByCoords(parseFloat(queryLat), parseFloat(queryLon), queryCity).catch(()=>{});
            } else {
              if (detectedLocation) {
                // Instantly display cached data of the user's detected location
                setWeatherData(detectedLocation);
              }
              // Trigger active GPS/IP detection in background
              getLocationWithIPFallback(true);
            }
          }, []);

          // Dynamic PWA Name and Web Manifest localization
          useEffect(() => {
            const name = translations[lang]?.appName || "Just Weather";
            document.title = name;
            
            // Set dynamic manifest to match user selection
            const manifestLink = document.querySelector('link[rel="manifest"]');
            if (manifestLink) {
              manifestLink.setAttribute('href', `manifest-${lang}.json`);
            }
            
            // Update Android application-name meta tags (for some browsers caching/installing)
            const metaAppName = document.querySelector('meta[name="application-name"]');
            if (metaAppName) metaAppName.setAttribute('content', name);
            const metaAppleTitle = document.querySelector('meta[name="apple-mobile-web-app-title"]');
            if (metaAppleTitle) metaAppleTitle.setAttribute('content', name);
          }, [lang]);

          // Autocomplete debounced search for cities
          useEffect(() => {
            const cleanQuery = searchQuery.trim();
            if (cleanQuery.length < 2) {
              setSuggestions([]);
              setShowSuggestions(false);
              return;
            }

            const timer = setTimeout(async () => {
              try {
                const res = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(cleanQuery)}&count=5&language=${lang === 'zh' ? 'en' : lang}`);
                if (res.ok) {
                  const data = await res.json();
                  setSuggestions(data.results || []);
                  setShowSuggestions((data.results || []).length > 0);
                }
              } catch (e) {
                console.error("Autocomplete fetch error:", e);
              }
            }, 300);

            return () => clearTimeout(timer);
          }, [searchQuery, lang]);

          const getActiveOverlayType = () => {
            if (!natureOverlayActive || !weatherData) return null;
            const category = getWeatherCategory(weatherData.code);
            if (category === "rainy" || category === "stormy") return "rain";
            if (category === "snowy" || weatherData.windspeed > 15) return "wind";
            if (category === "clear") return "breeze";
            return "wind"; // Default fallback for cloudy/foggy
          };

          // Ambient soundscape playback control based on selectedSound, natureOverlayActive and isSoundPlaying
          useEffect(() => {
            if (isSoundPlaying && selectedSound) {
              if (activeSoundRef.current) {
                activeSoundRef.current.stop();
                activeSoundRef.current = null;
              }
              
              const overlayType = getActiveOverlayType();
              activeSoundRef.current = playSynthesizedSound(selectedSound, overlayType);
            } else {
              if (activeSoundRef.current) {
                activeSoundRef.current.stop();
                activeSoundRef.current = null;
              }
            }
            
            return () => {
              if (activeSoundRef.current) {
                activeSoundRef.current.stop();
                activeSoundRef.current = null;
              }
            };
          }, [isSoundPlaying, selectedSound, natureOverlayActive, weatherData ? getWeatherCategory(weatherData.code) : null, weatherData ? weatherData.windspeed > 15 : false]);

          // Breathing Coach
          useEffect(() => {
            if (isBreathing) {
              const runBreathingCycle = () => {
                setBreathPhase('inhale');
                triggerVibration(100);
                breathTimerRef.current = setTimeout(() => {
                  setBreathPhase('hold');
                  triggerVibration([50, 50, 50]);
                  breathTimerRef.current = setTimeout(() => {
                    setBreathPhase('exhale');
                    triggerVibration([200]);
                    breathTimerRef.current = setTimeout(() => {
                      setBreathCount(prev => prev + 1);
                      runBreathingCycle();
                    }, 4000);
                  }, 4000);
                }, 4000);
              };
              runBreathingCycle();
            } else {
              if (breathTimerRef.current) clearTimeout(breathTimerRef.current);
              setBreathPhase('idle');
            }
            return () => { if (breathTimerRef.current) clearTimeout(breathTimerRef.current); };
          }, [isBreathing]);

          const getWeatherEmoji = (code, precipProb = 0, isHourNight = false) => {
            const moonEmoji = (moonPhaseInfo && moonPhaseInfo.emoji) ? moonPhaseInfo.emoji : "🌙";
            if (code === 0 || code === 1) return isHourNight ? moonEmoji : "☀️";
            if (code === 2 || code === 3) return isHourNight ? "☁️" : "⛅";
            if (code === 45 || code === 48) return "🌫️";
            if ((code >= 51 && code <= 67) || (code >= 80 && code <= 82)) {
                if (precipProb < 30) return isHourNight ? "🌧️" : "🌦️"; 
                return "🌧️"; 
            }
            if ((code >= 71 && code <= 77) || (code >= 85 && code <= 86)) return "❄️";
            if (code >= 95) return "⛈️";
            return isHourNight ? moonEmoji : "☀️";
          };

          const renderWeatherIcon = (category, code, isNightVal = false) => {
            const defaultClass = "w-28 h-28 stroke-current filter drop-shadow-lg transition-all duration-1000";
            switch (category) {
              case 'clear': 
                if (code === 1 || code === 2) {
                    if (isNightVal) {
                        // Moon with cloud
                        return <svg className={`${defaultClass} ${currentTheme.iconColor} animate-bounce-slow`} fill="none" viewBox="0 0 24 24" strokeWidth="1.2">
                            <path strokeLinecap="round" strokeLinejoin="round" d="M3 15a4 4 0 004 4h9a5 5 0 10-1-9.9V9a4 4 0 00-8 0v.1A4 4 0 003 15z" />
                            <path strokeLinecap="round" strokeLinejoin="round" d="M19.5 7.5A3 3 0 0115.6 3.6a3 3 0 003.9 3.9z" className="animate-pulse" />
                        </svg>;
                    }
                    // Parțial înnorat primește iconița cu soare și nor
                    return <svg className={`${defaultClass} ${currentTheme.iconColor} animate-bounce-slow`} fill="none" viewBox="0 0 24 24" strokeWidth="1.2">
                        <path strokeLinecap="round" strokeLinejoin="round" d="M3 15a4 4 0 004 4h9a5 5 0 10-1-9.9V9a4 4 0 00-8 0v.1A4 4 0 003 15z" />
                        <circle cx="18" cy="8" r="3" className="animate-pulse" />
                    </svg>;
                }
                if (isNightVal) {
                    // Crescent Moon for clear night
                    return <svg className={`${defaultClass} ${currentTheme.iconColor} animate-bounce-slow`} fill="none" viewBox="0 0 24 24" strokeWidth="1.2">
                        <path strokeLinecap="round" strokeLinejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
                    </svg>;
                }
                // Senin perfect primește doar soare
                return <svg className={`${defaultClass} ${currentTheme.iconColor} animate-spin-slow`} fill="none" viewBox="0 0 24 24" strokeWidth="1.2"><circle cx="12" cy="12" r="5" strokeLinecap="round" strokeLinejoin="round" /><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41" strokeLinecap="round" strokeLinejoin="round" /></svg>;
              case 'cloudy': 
                return <svg className={`${defaultClass} ${currentTheme.iconColor} animate-bounce-slow`} fill="none" viewBox="0 0 24 24" strokeWidth="1.2"><path strokeLinecap="round" strokeLinejoin="round" d="M2.25 15a4.5 4.5 0 004.5 4.5H18a3.75 3.75 0 001.332-7.257 3 3 0 00-3.758-3.848 5.25 5.25 0 00-10.233 2.33A4.502 4.502 0 002.25 15z" /></svg>;
              case 'rainy': 
                if(code === 51 || code === 53 || code === 61 || code === 80) { 
                    return <svg className={`${defaultClass} ${currentTheme.iconColor}`} fill="none" viewBox="0 0 24 24" strokeWidth="1.2"><path strokeLinecap="round" strokeLinejoin="round" d="M2.25 15a4.5 4.5 0 004.5 4.5H18a3.75 3.75 0 001.332-7.257 3 3 0 00-3.758-3.848 5.25 5.25 0 00-10.233 2.33A4.502 4.502 0 002.25 15z" /><path className="animate-pulse" strokeLinecap="round" strokeLinejoin="round" d="M12 22.5V21" /></svg>;
                }
                return <svg className={`${defaultClass} ${currentTheme.iconColor}`} fill="none" viewBox="0 0 24 24" strokeWidth="1.2"><path strokeLinecap="round" strokeLinejoin="round" d="M2.25 15a4.5 4.5 0 004.5 4.5H18a3.75 3.75 0 001.332-7.257 3 3 0 00-3.758-3.848 5.25 5.25 0 00-10.233 2.33A4.502 4.502 0 002.25 15z" /><path className="animate-pulse" strokeLinecap="round" strokeLinejoin="round" d="M8.25 21v-1.5M12 22.5V21M15.75 21v-1.5" /></svg>;
              case 'snowy': return <svg className={`${defaultClass} ${currentTheme.iconColor} animate-spin-slow`} fill="none" viewBox="0 0 24 24" strokeWidth="1.2"><path strokeLinecap="round" strokeLinejoin="round" d="M12 3v18M3 12h18m-3-6L6 18M6 6l12 12" /></svg>;
              case 'stormy': return <svg className={`${defaultClass} ${currentTheme.iconColor}`} fill="none" viewBox="0 0 24 24" strokeWidth="1.2"><path strokeLinecap="round" strokeLinejoin="round" d="M2.25 15a4.5 4.5 0 004.5 4.5H18a3.75 3.75 0 001.332-7.257 3 3 0 00-3.758-3.848 5.25 5.25 0 00-10.233 2.33A4.502 4.502 0 002.25 15z" /><path className="animate-pulse" strokeLinecap="round" strokeLinejoin="round" d="M11.25 19.5l-3 4.5h6l-3 4.5" /></svg>;
              case 'foggy': return <svg className={`${defaultClass} ${currentTheme.iconColor} animate-pulse`} fill="none" viewBox="0 0 24 24" strokeWidth="1.2"><path strokeLinecap="round" strokeLinejoin="round" d="M3 10h18M3 14h18M5 18h14" /></svg>;
              default: return null;
            }
          };

          const getSoundBtnClass = (soundType, isActive) => {
            const base = "flex-grow flex items-center justify-center gap-2 px-3 py-2.5 rounded-xl text-xs font-bold transition-all border active:scale-95";
            if (isActive) {
              if (soundType === 'pink') {
                return `${base} ${currentTheme.isDark ? 'bg-rose-950/40 border-rose-500/30 text-rose-200 shadow-md shadow-rose-950/20' : 'bg-rose-500/10 border-rose-500/30 text-rose-900 shadow-sm shadow-rose-500/10'}`;
              } else if (soundType === 'brown') {
                return `${base} ${currentTheme.isDark ? 'bg-amber-950/40 border-amber-500/30 text-amber-200 shadow-md shadow-amber-950/20' : 'bg-amber-500/10 border-amber-500/30 text-amber-900 shadow-sm shadow-amber-500/10'}`;
              } else if (soundType === 'white') {
                return `${base} ${currentTheme.isDark ? 'bg-zinc-800/60 border-zinc-700/60 text-zinc-100 shadow-md shadow-zinc-800/20' : 'bg-zinc-100 border-zinc-300 text-zinc-900 shadow-sm shadow-zinc-100/10'}`;
              } else if (soundType === 'green') {
                return `${base} ${currentTheme.isDark ? 'bg-emerald-950/40 border-emerald-500/30 text-emerald-200 shadow-md shadow-emerald-950/20' : 'bg-emerald-500/10 border-emerald-500/30 text-emerald-900 shadow-sm shadow-emerald-500/10'}`;
              }
            }
            return `${base} border-transparent bg-black/5 dark:bg-white/5 text-current opacity-55 hover:opacity-90`;
          };

          const circleStyle = {
            transform: breathPhase === 'inhale' || breathPhase === 'hold' ? 'scale(1.8)' : 'scale(1)',
            backgroundColor: currentTheme.isDark ? 'rgba(255, 255, 255, 0.05)' : 'rgba(0, 0, 0, 0.05)',
            boxShadow: breathPhase === 'hold' 
              ? (currentTheme.isDark ? '0 0 30px rgba(255, 255, 255, 0.15)' : '0 0 40px rgba(0, 0, 0, 0.15)')
              : 'none',
            transition: isBreathing ? 'all 4000ms cubic-bezier(0.4, 0, 0.2, 1)' : 'all 1000ms ease'
          };

          const auraColors = {
            clear: "bg-amber-400 dark:bg-orange-500",
            cloudy: "bg-slate-400 dark:bg-zinc-500",
            rainy: "bg-indigo-500 dark:bg-blue-600",
            snowy: "bg-sky-300 dark:bg-indigo-300",
            stormy: "bg-purple-600 dark:bg-violet-600",
            foggy: "bg-stone-400 dark:bg-zinc-500"
          };

          const auraStyle = {
            transform: breathPhase === 'inhale' || breathPhase === 'hold' ? 'scale(2.4)' : 'scale(1)',
            transition: isBreathing ? 'all 4000ms cubic-bezier(0.4, 0, 0.2, 1)' : 'all 1000ms ease'
          };

          const breathTextColor = currentTheme.isDark ? '#f4f4f5' : '#0f172a';

          return (
            <div className={`min-h-screen flex flex-col items-center justify-start p-4 md:p-8 transition-all duration-[1500ms] ease-in-out bg-gradient-to-br ${currentTheme.bgGradient}`}>
              
              <main className="w-full max-w-xl flex-grow flex flex-col justify-start items-center z-10 gap-6 mt-4">
                
                {/* PWA INSTALL BANNER FOR ANDROID/PC */}
                {showInstallBanner && (
                  <div className={`w-full rounded-3xl p-4 md:p-5 border backdrop-blur-3xl shadow-xl flex items-center justify-between gap-4 animate-fadeIn relative z-40 ${currentTheme.cardBg} ${currentTheme.textPrimary}`}>
                    <div className="flex items-center gap-3">
                      <span className="text-xl shrink-0">📲</span>
                      <p className="text-[11px] font-semibold leading-relaxed">
                        {translations[lang]?.installPrompt}
                      </p>
                    </div>
                    <div className="flex gap-2 shrink-0">
                      <button 
                        onClick={handleDismissInstall}
                        className="px-3 py-1.5 rounded-xl text-[10px] font-bold opacity-60 hover:opacity-100 transition-opacity"
                      >
                        {translations[lang]?.installLater}
                      </button>
                      <button 
                        onClick={handleInstallClick}
                        className="px-3.5 py-1.5 rounded-xl text-[10px] font-bold bg-indigo-600 hover:bg-indigo-500 text-white shadow-md shadow-indigo-500/20 active:scale-95 transition-all"
                      >
                        {translations[lang]?.installBtn}
                      </button>
                    </div>
                  </div>
                )}
                
                {/* Language Selection Segmented Control */}
                <div className={`w-full animate-fadeIn relative z-50 flex rounded-full p-1 gap-1 border backdrop-blur-3xl shadow-sm ${currentTheme.panelBg} ${currentTheme.textPrimary}`}>
                  {['ro', 'en', 'es', 'fr', 'zh'].map((l) => {
                    const isActive = lang === l;
                    const langLabels = {
                      ro: "Română",
                      en: "English",
                      es: "Español",
                      fr: "Français",
                      zh: "中文"
                    };
                    return (
                      <button
                        key={l}
                        type="button"
                        onClick={() => { setLang(l); triggerVibration(15); }}
                        className={`flex-grow flex-1 py-2.5 rounded-full text-[10px] sm:text-xs font-bold transition-all active:scale-95 ${
                          isActive 
                            ? currentTheme.btnActive 
                            : 'opacity-60 hover:opacity-100 hover:bg-black/5 dark:hover:bg-white/5'
                        }`}
                      >
                        {langLabels[l]}
                      </button>
                    );
                  })}
                </div>

                {/* Search Bar Wrapper cu Z-Index mărit (Fix pentru dropdown ascuns) */}
                <div className="w-full animate-fadeIn relative z-50">
                  <form onSubmit={handleSearch} className="w-full flex gap-3 relative z-50">
                    <div className="relative flex-grow">
                      <input
                        type="text" 
                        value={searchQuery} 
                        onChange={(e) => setSearchQuery(e.target.value)}
                        onFocus={() => suggestions.length > 0 && setShowSuggestions(true)}
                        onBlur={() => setTimeout(() => setShowSuggestions(false), 200)}
                        placeholder={translations[lang]?.searchPlaceholder}
                        className={`w-full rounded-3xl pl-6 pr-14 py-4 text-base font-semibold transition-all outline-none focus:scale-[1.02] shadow-sm focus:shadow-xl ${currentTheme.cardBg} ${currentTheme.textPrimary} placeholder:text-current placeholder:opacity-40`}
                      />
                      <button 
                        type="button" onClick={getLocationWithIPFallback}
                        className="absolute right-3 top-1/2 transform -translate-y-1/2 p-2.5 rounded-full hover:bg-black/10 dark:hover:bg-white/10 text-current transition-all active:scale-75"
                      >
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polygon points="3 11 22 2 13 21 11 13 3 11"></polygon></svg>
                      </button>
                    </div>
                  </form>
                  
                  {/* AUTOCOMPLETE DROPDOWN */}
                  {showSuggestions && suggestions.length > 0 && (
                     <div className={`absolute top-full left-0 right-0 mt-3 z-50 flex flex-col rounded-[1.5rem] overflow-hidden backdrop-blur-md border shadow-2xl animate-fadeInDrop ${currentTheme.isDark ? 'bg-zinc-950/95 border-zinc-800' : 'bg-white/95 border-zinc-200'} ${currentTheme.textPrimary}`}>
                       {suggestions.map((city, index) => (
                         <button
                           key={index}
                           type="button"
                           onClick={() => handleSuggestionClick(city)}
                           className="w-full text-left px-6 py-4 hover:bg-black/5 dark:hover:bg-white/10 transition-all font-semibold text-sm border-b border-black/5 dark:border-white/5 last:border-0"
                         >
                           <span className="block text-base">{city.name}</span>
                           <span className="block text-[11px] opacity-60 mt-0.5 uppercase tracking-wider">
                              {city.admin1 ? `${city.admin1}, ` : ''}{city.country}
                           </span>
                         </button>
                       ))}
                     </div>
                  )}

                  {savedCities.length > 0 && (
                    <div className={`w-full flex flex-wrap items-center gap-2 mt-4 px-2 relative z-30 ${currentTheme.textPrimary}`}>
                      <span className="text-[10px] font-bold uppercase opacity-50 mr-1">{translations[lang]?.savedCities}</span>
                      {savedCities.map((cityObj, idx) => (
                        <button 
                          key={idx} type="button" onClick={() => { fetchWeatherByCoords(cityObj.lat, cityObj.lon, cityObj.city); triggerVibration(20); }}
                          className={`px-3 py-1.5 rounded-full text-xs font-bold transition-all active:scale-90 shadow-sm border border-white/10 ${currentTheme.btnInactive}`}
                        >
                          {cityObj.city === "currentLocation" ? translations[lang].currentLocation : cityObj.city}
                        </button>
                      ))}
                    </div>
                  )}
                </div>

                {/* Status & Alerts z-index set to lower to not block autocomplete */}
                <div className="w-full flex flex-col items-center gap-2 relative z-30">
                    {statusMessage && <div className={`text-sm px-5 py-2.5 rounded-full animate-pulse font-bold shadow-sm ${currentTheme.badgeBg}`}>{statusMessage}</div>}
                    {locationWarning && <div className="text-xs px-5 py-2.5 rounded-full bg-orange-500/10 border border-orange-500/20 text-orange-600 dark:text-orange-400 flex items-center gap-2 font-semibold"><span>ℹ️</span> {locationWarning}</div>}
                    {mindfulAlert && <div className={`text-xs md:text-sm px-5 py-3 rounded-2xl ${currentTheme.cardBg} ${currentTheme.textPrimary} font-semibold text-center w-full shadow-sm animate-fadeIn`}>{mindfulAlert}</div>}
                </div>

                {/* SKELETON LOADER */}
                {loading && !weatherData && (
                  <div className={`w-full rounded-[2rem] p-6 md:p-8 flex flex-col items-center gap-8 animate-pulse relative z-30 ${currentTheme.cardBg}`}>
                     <div className="h-6 w-24 bg-current opacity-10 rounded-full mb-2"></div>
                     <div className="h-10 w-48 bg-current opacity-10 rounded-xl"></div>
                     <div className="h-32 w-32 bg-current opacity-10 rounded-full my-4"></div>
                     <div className="flex gap-4 w-full mt-4">
                        <div className="flex-1 h-20 bg-current opacity-10 rounded-2xl"></div>
                        <div className="flex-1 h-20 bg-current opacity-10 rounded-2xl"></div>
                        <div className="flex-1 h-20 bg-current opacity-10 rounded-2xl"></div>
                     </div>
                  </div>
                )}

                {/* DATA CARD */}
                {weatherData && (
                  <div className={`w-full rounded-[2rem] p-6 md:p-8 transition-all duration-1000 flex flex-col items-center gap-8 animate-fadeIn relative z-20 ${currentTheme.cardBg} ${currentTheme.textPrimary}`}>
                    
                    <div className="flex w-full mb-2 relative z-20 gap-2">
                      <button onClick={() => { setActiveTab('weather'); triggerVibration(10); }} className={`flex-1 pb-3 text-xs sm:text-sm transition-all border-b-[3px] ${activeTab === 'weather' ? 'border-current font-bold' : 'border-transparent font-semibold opacity-40 hover:opacity-100'}`}>{translations[lang]?.weatherTab}</button>
                      <button onClick={() => { setActiveTab('tips'); triggerVibration(10); }} className={`flex-1 pb-3 text-xs sm:text-sm transition-all border-b-[3px] ${activeTab === 'tips' ? 'border-current font-bold' : 'border-transparent font-semibold opacity-40 hover:opacity-100'}`}>{translations[lang]?.tipsTab}</button>
                    </div>

                    {activeTab === 'weather' && (
                      <div className="w-full flex flex-col gap-8 animate-fadeIn">
                        <div className="flex flex-col items-center gap-3">
                          <span className={`text-[10px] font-bold uppercase tracking-[0.2em] px-4 py-1.5 rounded-full shadow-sm ${currentTheme.badgeBg}`}>
                            {getWeatherDesc(weatherData.code)}
                          </span>
                          <div className="flex items-center justify-center gap-3 mt-2">
                            <h2 className="text-3xl md:text-4xl font-semibold tracking-tight">{weatherData.city === "currentLocation" ? translations[lang].currentLocation : weatherData.city}</h2>
                            <button onClick={toggleSaveCity} className={`p-2.5 rounded-full transition-all active:scale-75 ${isCurrentCitySaved ? 'text-yellow-500 drop-shadow-md' : 'opacity-30 hover:opacity-100 hover:bg-black/5 dark:hover:bg-white/5'}`}>
                              <svg width="24" height="24" viewBox="0 0 24 24" fill={isCurrentCitySaved ? "currentColor" : "none"} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
                            </button>
                          </div>
                          
                          {/* AQI Badge */}
                          {weatherData.aqi !== null && (
                            <div className="flex items-center gap-1 text-[11px] font-semibold opacity-70 mt-1">
                                <span>🍃 {translations[lang].aqi}:</span>
                                <span>{weatherData.aqi} ({getAQIText(weatherData.aqi)})</span>
                            </div>
                          )}

                          {/* Moon Phase Badge */}
                          {isNight && moonPhaseInfo && (
                            <div className="flex items-center gap-1.5 text-[11px] font-semibold opacity-70 mt-1">
                                <span>{moonPhaseInfo.emoji} {translations[lang].moonPhase || "Faza Lunii"}:</span>
                                <span>{moonPhaseInfo.name[lang]}</span>
                            </div>
                          )}
                        </div>

                        <div className="flex flex-col sm:flex-row items-center justify-center gap-6 md:gap-10">
                          {renderWeatherIcon(weatherCategory, weatherData.code, isNight)}
                          <div className="text-center sm:text-left">
                            <span className="text-7xl md:text-8xl font-light tracking-tighter drop-shadow-sm" style={{ whiteSpace: 'nowrap' }}>{weatherData.temp}°</span>
                            <p className={`text-sm font-semibold mt-2 opacity-70`}>{translations[lang]?.feelsLike}: <span style={{ whiteSpace: 'nowrap' }}>{weatherData.feels}°C</span></p>
                          </div>
                        </div>

                        {/* Răsărit și Apus */}
                        <div className={`w-full flex flex-wrap justify-center sm:justify-between items-center gap-2 px-6 py-3 rounded-2xl text-[10px] sm:text-xs font-bold uppercase tracking-wider sm:tracking-widest ${currentTheme.panelBg} opacity-80`}>
                            <div className="flex items-center gap-2" style={{ whiteSpace: 'nowrap' }}>🌅 {translations[lang].sunrise} <span className="font-semibold">{weatherData.sunrise ? formatTime(weatherData.sunrise) : "--:--"}</span></div>
                            <div className="flex items-center gap-2" style={{ whiteSpace: 'nowrap' }}>🌇 {translations[lang].sunset} <span className="font-semibold">{weatherData.sunset ? formatTime(weatherData.sunset) : "--:--"}</span></div>
                        </div>

                        <div className="grid grid-cols-3 gap-3 w-full">
                          <div className={`flex flex-col items-center p-4 rounded-2xl ${currentTheme.panelBg}`}>
                            <span className={`text-[10px] font-bold uppercase opacity-50`}>{translations[lang]?.wind}</span>
                            <span className="text-sm font-bold mt-1.5">{weatherData.windspeed} km/h</span>
                          </div>
                          <div className={`flex flex-col items-center p-4 rounded-2xl ${currentTheme.panelBg}`}>
                            <span className={`text-[10px] font-bold uppercase opacity-50`}>{translations[lang]?.humidity}</span>
                            <span className="text-sm font-bold mt-1.5">{weatherData.humidity}%</span>
                          </div>
                          <div className={`flex flex-col items-center p-4 rounded-2xl ${currentTheme.panelBg}`}>
                            <span className={`text-[10px] font-bold uppercase opacity-50`}>{translations[lang]?.precipitation}</span>
                            <span className="text-sm font-bold mt-1.5">{weatherData.precipitation} mm</span>
                          </div>
                        </div>

                        {weatherData.hourly && (
                          <div className="w-full pt-2">
                            <h4 className="text-[10px] font-bold uppercase tracking-widest mb-4 opacity-50 pl-1">{translations[lang]?.hourlyTitle}</h4>
                            <div className="flex overflow-x-auto gap-3 pb-2 scrollbar-none">
                              {weatherData.hourly.map((h, i) => (
                                <div key={i} className={`flex flex-col items-center min-w-[70px] p-3 rounded-2xl ${currentTheme.panelBg}`}>
                                  <span className="text-xs opacity-70 font-semibold">{formatTime(h.time)}</span>
                                  <span className="text-xl my-2 drop-shadow-sm">{getWeatherEmoji(h.code, h.precipProb, checkIfHourIsNight(h.time))}</span>
                                  {h.precipProb > 0 ? (
                                    <span className={`text-[10px] font-bold ${isSystemDark ? 'text-blue-300' : 'text-blue-600'} opacity-90 -mt-1 mb-1`}>{h.precipProb}%</span>
                                  ) : <div className="h-4" />}
                                  <span className="text-sm font-bold" style={{ whiteSpace: 'nowrap' }}>{h.temp}°</span>
                                </div>
                              ))}
                            </div>
                          </div>
                        )}

                        {weatherData.daily && (
                          <div className="w-full pt-2">
                            <h4 className="text-[10px] font-bold uppercase tracking-widest mb-4 opacity-50 pl-1">{translations[lang]?.dailyTitle}</h4>
                            <div className="flex flex-col gap-2">
                              {weatherData.daily.map((d, i) => (
                                <div key={i} className={`flex items-center justify-between p-4 rounded-2xl text-sm ${currentTheme.panelBg}`}>
                                  <span className="font-bold uppercase opacity-90" style={{ width: '4.8rem', whiteSpace: 'nowrap', flexShrink: 0 }}>
                                    {new Date(d.day.replace(/-/g, '/')).toLocaleDateString(lang, { weekday: 'short' })}
                                  </span>
                                  <div className="flex items-center justify-center gap-2 flex-1">
                                    <span className="text-xl drop-shadow-sm">{getWeatherEmoji(d.code, d.precipProb)}</span>
                                    {d.precipProb > 0 && (
                                      <span className={`text-[10px] font-bold ${isSystemDark ? 'text-blue-300 bg-blue-900/30' : 'text-blue-600 bg-blue-500/10'} opacity-90 px-2 py-0.5 rounded-full`} style={{ whiteSpace: 'nowrap' }}>
                                        {d.precipProb}%
                                      </span>
                                    )}
                                  </div>
                                  <div className="flex gap-3 font-bold justify-end" style={{ width: '4.8rem', whiteSpace: 'nowrap', flexShrink: 0 }}>
                                    <span className="opacity-100">{d.max}°</span>
                                    <span className="opacity-40">{d.min}°</span>
                                  </div>
                                </div>
                              ))}
                            </div>
                          </div>
                        )}
                      </div>
                    )}

                    {activeTab === 'tips' && (
                      <div className="w-full flex flex-col gap-6 text-center animate-fadeIn">
                        <div className="w-full text-left">
                          <h3 className={`text-[10px] font-bold tracking-widest uppercase opacity-50 mb-3 pl-1`}>{translations[lang]?.tipsTitle}</h3>
                          <div className={`text-sm md:text-base font-semibold leading-relaxed p-5 rounded-2xl ${currentTheme.panelBg}`}>
                            <span className="mr-2 opacity-80">💡</span> {selectedWeatherTip}
                          </div>
                        </div>

                        <div className="w-full text-left">
                          <h3 className={`text-[10px] font-bold tracking-widest uppercase opacity-50 mb-3 pl-1`}>{translations[lang]?.[`period_${timePeriod}`]}</h3>
                          <div className={`text-sm md:text-base font-semibold leading-relaxed p-5 rounded-2xl ${currentTheme.panelBg}`}>
                            <span className="mr-2 opacity-80">🧘‍♀️</span> {selectedTimeOfDayTip}
                          </div>
                        </div>

                        <div className="w-full text-left">
                          <h3 className={`text-[10px] font-bold tracking-widest uppercase opacity-50 mb-3 pl-1`}>{translations[lang]?.generalTipsTitle}</h3>
                          <div className="grid grid-cols-1 md:grid-cols-2 gap-3 text-xs md:text-sm">
                            {[selectedGeneralTip1, selectedGeneralTip2].map((tip, idx) => (
                              <div key={idx} className={`p-4 rounded-2xl flex items-start gap-3 font-semibold ${currentTheme.panelBg}`}>
                                <span className="opacity-70">✨</span> <span>{tip}</span>
                              </div>
                            ))}
                          </div>
                        </div>
                      </div>
                    )}
                  </div>
                )}

                {/* RESPIRATIE CARD */}
                <section className={`w-full rounded-[2rem] p-6 md:p-8 flex flex-col items-center gap-6 text-center transition-all duration-1000 animate-fadeIn relative z-10 ${currentTheme.cardBg} ${currentTheme.textPrimary}`}>
                  
                  <div className="max-w-md text-center">
                    <h3 className="text-lg md:text-xl font-bold tracking-tight">{translations[lang]?.breathingTitle}</h3>
                    <p className={`text-xs mt-1 font-semibold opacity-60`}>{translations[lang]?.breathingSubtitle}</p>
                  </div>

                  <div className="h-48 w-48 flex items-center justify-center relative my-6">
                    <div className="absolute inset-0 rounded-full border-[1.5px] border-current opacity-10 animate-pulse"></div>
                    {/* Visual Ambient Aura */}
                    <div 
                      style={auraStyle} 
                      className={`absolute rounded-full w-24 h-24 filter blur-3xl transition-all duration-[4000ms] opacity-25 dark:opacity-40 ${auraColors[weatherCategory] || 'bg-amber-400'}`}
                    ></div>
                    <div style={circleStyle} className="absolute rounded-full w-24 h-24 backdrop-blur-sm border border-white/30"></div>
                    <div className="relative z-10 font-black text-xs uppercase tracking-[0.3em] text-center select-none opacity-90 drop-shadow-md">
                        {isBreathing ? (breathPhase === 'inhale' ? translations[lang]?.inhale : breathPhase === 'hold' ? translations[lang]?.hold : translations[lang]?.exhale) : ""}
                    </div>
                  </div>

                  <div className="flex flex-col items-center gap-3 w-full">
                    <button
                      type="button" onClick={() => { setIsBreathing(!isBreathing); triggerVibration(30); if(!isBreathing) setBreathCount(0); }}
                      className={`w-full md:w-auto px-10 py-4 rounded-full text-sm font-bold transition-all active:scale-95 ${
                        isBreathing ? 'bg-rose-500 text-white shadow-xl shadow-rose-500/40 border-none' : currentTheme.btnActive
                      }`}
                    >
                      {isBreathing ? translations[lang]?.stopBreathing : translations[lang]?.startBreathing}
                    </button>
                    {isBreathing && <span className="text-[10px] uppercase tracking-widest opacity-60 mt-2 font-bold">{translations[lang]?.cyclesCompleted}: {breathCount}</span>}

                    {/* Ambient Sounds Controller */}
                    <div className="w-full mt-6 pt-5 border-t border-black/5 dark:border-white/10 flex flex-col items-center gap-4">
                      <span className="text-[10px] font-bold uppercase tracking-widest opacity-65">
                        🔊 {translations[lang]?.ambientTitle}
                      </span>
                      
                      {/* Grid 2x2 Selector */}
                      <div className="grid grid-cols-2 gap-2.5 w-full max-w-sm">
                        {['pink', 'brown', 'white', 'green'].map((soundKey) => {
                          const isActive = selectedSound === soundKey;
                          return (
                            <button
                              key={soundKey}
                              type="button"
                              onClick={() => { setSelectedSound(soundKey); triggerVibration(20); }}
                              className={getSoundBtnClass(soundKey, isActive)}
                            >
                              <span className="text-xs">
                                {soundKey === 'pink' ? '🌸' : soundKey === 'brown' ? '🤎' : soundKey === 'white' ? '🤍' : '💚'}
                              </span>
                              <span>
                                {translations[lang]?.[soundKey + 'Noise']}
                              </span>
                            </button>
                          );
                        })}
                      </div>

                      {/* Beneficiu Terapeutic */}
                      <div className={`text-xs font-semibold px-4 py-3 rounded-2xl w-full max-w-sm ${currentTheme.panelBg} leading-relaxed transition-all duration-300`}>
                        {translations[lang]?.[selectedSound + 'NoiseDesc']}
                      </div>

                      {/* Nature Overlay Toggle */}
                      <label className="flex items-center gap-3 cursor-pointer group mt-1 mb-2 select-none w-full max-w-sm justify-center">
                        <div className="relative">
                          <input 
                            type="checkbox" 
                            checked={natureOverlayActive} 
                            onChange={(e) => { setNatureOverlayActive(e.target.checked); triggerVibration(10); }}
                            className="sr-only" 
                          />
                          <div className={`w-9 h-5 rounded-full transition-all duration-300 ${natureOverlayActive ? (currentTheme.isDark ? 'bg-emerald-600/80' : 'bg-emerald-500') : 'bg-black/10 dark:bg-white/10'}`}></div>
                          <div className={`absolute left-0.5 top-0.5 w-4 h-4 bg-white rounded-full transition-transform duration-300 shadow-sm ${natureOverlayActive ? 'translate-x-4' : 'translate-x-0'}`}></div>
                        </div>
                        <span className="text-[11px] font-bold opacity-75 group-hover:opacity-100 transition-opacity">
                          🌿 {translations[lang]?.natureOverlayToggle}
                        </span>
                      </label>

                      {/* Butonul Play/Pause */}
                      <button
                        type="button"
                        onClick={() => { setIsSoundPlaying(!isSoundPlaying); triggerVibration(15); }}
                        className={`px-8 py-3 rounded-full text-xs font-bold transition-all active:scale-95 flex items-center justify-center gap-2 ${
                          isSoundPlaying 
                            ? 'bg-rose-500/80 hover:bg-rose-500 text-white shadow-lg shadow-rose-500/20' 
                            : currentTheme.btnActive
                        }`}
                      >
                        <span className="text-sm">
                          {isSoundPlaying ? "⏸️" : "▶️"}
                        </span>
                        <span>
                          {isSoundPlaying ? translations[lang]?.ambientStop : translations[lang]?.ambientPlay}
                        </span>
                      </button>
                    </div>
                  </div>
                </section>

              </main>

              <footer className={`w-full max-w-xl text-center py-6 mt-8 z-10 ${currentTheme.textPrimary} opacity-50`}>
                <p className="text-[10px] uppercase tracking-widest font-bold flex items-center justify-center gap-1.5 flex-wrap">
                  <span>{translations[lang]?.credits}</span>
                  <span>•</span>
                  <a 
                    href="./privacy.html" 
                    target="_blank" 
                    rel="noopener noreferrer" 
                    className="hover:underline hover:opacity-100 transition-opacity"
                  >
                    {lang === 'ro' ? 'Confidențialitate' : lang === 'es' ? 'Privacidad' : lang === 'fr' ? 'Confidentialité' : lang === 'zh' ? '隐私政策' : 'Privacy Policy'}
                  </a>
                </p>
              </footer>

              {showUpdateToast && (
                <div className={`fixed bottom-6 left-4 right-4 md:left-auto md:right-6 md:w-96 z-[9999] rounded-2xl border backdrop-blur-3xl shadow-2xl animate-fadeInDrop p-5 flex flex-col gap-3 ${currentTheme.cardBg} ${currentTheme.textPrimary}`}>
                  <div className="flex items-start gap-3">
                    <div className="p-2 bg-indigo-500/20 text-indigo-400 rounded-xl mt-0.5 flex items-center justify-center shrink-0">
                      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                        <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/>
                      </svg>
                    </div>
                    <div className="flex-1">
                      <h4 className="font-bold text-sm tracking-wide">
                        {translations[lang]?.updateTitle}
                      </h4>
                      <p className="text-xs opacity-80 mt-1 leading-relaxed">
                        {translations[lang]?.updateText}
                      </p>
                    </div>
                  </div>
                  <div className="flex gap-2 justify-end mt-1">
                    <button
                      onClick={() => setShowUpdateToast(false)}
                      className="px-4 py-2 rounded-xl text-xs font-bold transition-all opacity-60 hover:opacity-100"
                    >
                      {lang === 'ro' ? 'Mai târziu' : lang === 'es' ? 'Más tarde' : lang === 'fr' ? 'Plus tard' : lang === 'zh' ? '稍后' : 'Later'}
                    </button>
                    <button
                      onClick={handleUpdateApp}
                      className="px-4 py-2 rounded-xl text-xs font-bold transition-all bg-indigo-600 hover:bg-indigo-500 text-white shadow-lg shadow-indigo-500/25 active:scale-95"
                    >
                      {translations[lang]?.updateBtn}
                    </button>
                  </div>
                </div>
              )}

              {showIosTooltip && (
                <div className={`fixed bottom-6 left-4 right-4 z-[9999] rounded-2xl border backdrop-blur-3xl shadow-2xl p-5 flex flex-col gap-3 max-w-md mx-auto animate-fadeInDrop ${currentTheme.cardBg} ${currentTheme.textPrimary}`}>
                  <div className="flex items-start justify-between gap-2">
                    <h4 className="font-bold text-sm tracking-wide">
                      {translations[lang]?.iosInstallTitle}
                    </h4>
                    <button 
                      onClick={handleDismissIosTooltip}
                      className="p-1 hover:bg-black/5 dark:hover:bg-white/5 rounded-lg opacity-60 hover:opacity-100 transition-all text-xs leading-none"
                    >
                      ✕
                    </button>
                  </div>
                  <p className="text-xs opacity-85 leading-relaxed">
                    {translations[lang]?.iosInstallInstructions}
                  </p>
                </div>
              )}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
